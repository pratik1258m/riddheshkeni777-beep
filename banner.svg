  <path d="M 0 200 Q 200 240 400 200 T 800 200 L 800 240 L 0 240 Z" fill="#0f172a" opacity="0.3" />
  
  <text x="50%" y="45%" dominant-baseline="middle" text-anchor="middle" class="title">Riddhesh Keni</text>
  <text x="50%" y="70%" dominant-baseline="middle" text-anchor="middle" class="subtitle">Full-Stack Developer | AI Specialist | Technical Engineer</text>
